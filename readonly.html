<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>마케팅 식당 지도 👁 보기전용</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="식당지도 보기">
<meta name="theme-color" content="#1a1a2e">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;font-family:sans-serif;overflow:hidden;position:fixed;top:0;left:0}
#app{display:flex;flex-direction:column;height:100%;width:100%;position:fixed;top:0;left:0;right:0;bottom:0}

/* 헤더 */
#hd{background:#1a1a2e;color:#fff;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0}
#hd h1{font-size:13px;font-weight:700}
#hd h1 em{color:#f59e0b;font-style:normal}
.hbs{display:flex;gap:6px;align-items:center}
.view-badge{background:rgba(245,158,11,0.25);color:#f59e0b;border:1px solid rgba(245,158,11,0.4);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.conn-status{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;display:flex;align-items:center;gap:4px}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background .3s}
.conn-dot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.6)}

/* 필터바 */
#fbar{background:#fff;border-bottom:1px solid #e5e3de;padding:4px 10px 5px;flex-shrink:0}
.frow{display:flex;flex-direction:column;gap:3px}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:9px;font-weight:700;color:#888;letter-spacing:.4px;text-transform:uppercase}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #d1d5db;background:#fff;color:#555;user-select:none;white-space:nowrap}
.chips::-webkit-scrollbar{display:none}
.chip.ar{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.chip.am{background:#f59e0b;color:#1a1a2e;border-color:#f59e0b}
.chip.am[data-v="한식"]{background:#e84f4f;color:#fff;border-color:#e84f4f}
.chip.am[data-v="중식"]{background:#f97316;color:#fff;border-color:#f97316}
.chip.am[data-v="일식"]{background:#eab308;color:#1a1a2e;border-color:#eab308}
.chip.am[data-v="양식"]{background:#22c55e;color:#fff;border-color:#22c55e}
.chip.am[data-v="고기"]{background:#3b82f6;color:#fff;border-color:#3b82f6}
.chip.am[data-v="기타"]{background:#8b5cf6;color:#fff;border-color:#8b5cf6}

/* 검색바 */
#searchbar{background:#fff;border-bottom:1px solid #e5e3de;padding:4px 10px;flex-shrink:0;display:flex;align-items:center;gap:6px}
#searchbar input{width:33%;max-width:33%;border:1.5px solid #d1d5db;border-radius:20px;padding:5px 12px;font-size:12px;outline:none;color:#1a1a2e}
#searchbar input:focus{border-color:#1a1a2e}
#searchbar .sclear{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;padding:0 6px;line-height:1}

/* 메인 레이아웃 */
#main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0}
#sb{width:240px;min-width:240px;background:#fff;border-right:1px solid #e5e3de;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .25s,min-width .25s}
#sb.hide{width:0;min-width:0}
#sbh{padding:8px 11px;border-bottom:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;white-space:nowrap}
#sbh b{font-size:12px;color:#1a1a2e}
#sbh span{font-size:11px;color:#888}
#rl{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.ri{padding:9px 11px;border-bottom:1px solid #f3f4f6;cursor:pointer;border-left:3px solid transparent}
.ri.on{background:#fffbeb;border-left-color:#f59e0b}
.rn{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:3px;line-height:1.3}
.rt{display:flex;gap:3px;flex-wrap:wrap}
.tg{display:inline-block;padding:1px 5px;border-radius:7px;font-size:10px;font-weight:600}
.tgr{background:#f0f0f8;color:#444}
.tgm{background:#fff3d0;color:#92640a}
.tgm-h{background:#ffe0e0;color:#c0392b}
.tgm-c{background:#ffe8d0;color:#c2410c}
.tgm-j{background:#fef9c3;color:#854d0e}
.tgm-y{background:#dcfce7;color:#15803d}
.tgm-g{background:#dbeafe;color:#1d4ed8}
.tgm-e{background:#ede9fe;color:#6d28d9}
#nores{display:none;padding:20px 10px;text-align:center;color:#999;font-size:12px}

/* 사이드바 토글 */
#togwrap{position:relative;width:0;overflow:visible;z-index:600;flex-shrink:0}
#tog{position:absolute;top:50%;left:0;transform:translateY(-50%);background:#1a1a2e;color:#fff;border:none;width:20px;height:48px;cursor:pointer;border-radius:0 8px 8px 0;font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:2px 0 8px rgba(0,0,0,.25)}

/* 지도 영역 */
#mw{flex:1;position:relative;overflow:hidden;min-width:0}
#map{width:100%;height:100%}
#badge{position:absolute;bottom:14px;right:12px;background:rgba(26,26,46,.82);color:#fff;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;z-index:40;pointer-events:none}

/* 팝업 스타일 */
.leaflet-popup-content-wrapper{border-radius:12px!important;box-shadow:0 6px 32px rgba(0,0,0,.22)!important;padding:0!important;overflow:hidden;max-width:min(400px, calc(100vw - 80px))!important;width:min(400px, calc(100vw - 80px))!important}
.leaflet-popup-content{margin:0!important;width:100%!important;max-height:42vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.leaflet-popup-tip-container{margin-top:-1px}
.leaflet-popup-close-button{color:#fff!important;font-size:18px!important;padding:3px 6px!important;top:6px!important;right:6px!important;background:rgba(255,255,255,.2)!important;border-radius:50%!important;width:24px!important;height:24px!important;line-height:1!important}
.pph{background:#1a1a2e;padding:9px 14px 8px;position:relative}
.pph h3{color:#fff;font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.2;padding-right:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppbgs{display:flex;gap:5px;flex-wrap:nowrap;margin-top:3px;overflow:hidden}
.ppbg{font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px}
.ppbgr{background:rgba(255,255,255,.15);color:#ddd}
.ppb{padding:8px 14px}
.ppr{display:flex;gap:5px;margin-bottom:4px;font-size:12px;color:#444;align-items:center;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppls{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.ppl{display:flex;align-items:center;gap:2px;padding:3px 7px;border-radius:6px;font-size:10px;font-weight:600}
.pply{background:#ecfdf5;color:#059669}.ppln{background:#fef2f2;color:#dc2626}.pplu{background:#f3f4f6;color:#6b7280}
.ppsl{font-size:9px;font-weight:700;color:#999;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px}
.ppmo{background:#f9f8f5;border-radius:6px;padding:6px 9px;font-size:12px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-bottom:5px;border:1px solid #ece8df}
.pprv{background:#f0f4ff;border-radius:6px;padding:6px 9px;font-size:12px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word;border:1px solid #dce4f7}
.ppmo a,.pprv a{color:#2563eb;text-decoration:underline;word-break:break-all}
.ppft{padding:6px 14px 10px;display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid #f0ede8}
.nb{display:inline-flex;align-items:center;gap:3px;background:#03c75a;color:#fff;text-decoration:none;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700}

/* Firebase 연결 설정 모달 */
#fbSetupOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center}
#fbSetupOverlay.open{display:flex}
#fbSetupBox{background:#fff;border-radius:16px;width:400px;max-width:calc(100vw - 24px);padding:24px}
#fbSetupBox h2{font-size:16px;font-weight:700;margin-bottom:6px;color:#1a1a2e}
#fbSetupBox p{font-size:12px;color:#666;line-height:1.7;margin-bottom:14px}
.fbi{width:100%;padding:8px 10px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;margin-bottom:10px}
.fbi:focus{outline:none;border-color:#2563eb}
.sbr{display:flex;gap:6px}
.fbok{flex:1;background:#2563eb;color:#fff;border:none;padding:10px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.fbsk{background:#f3f4f6;color:#555;border:none;padding:10px 14px;border-radius:7px;font-size:13px;cursor:pointer}

/* 로딩 상태 */
#loadingOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,26,46,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loadingOverlay.show{display:flex}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:13px;font-weight:600}

/* 토스트 */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a2e;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:99999;transition:transform .24s,opacity .24s;opacity:0;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* 데이터 없음 안내 */
#noDataMsg{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#888;pointer-events:none;z-index:10}
#noDataMsg p{font-size:13px;line-height:1.8}

@media(max-width:480px){
  #sb{width:210px;min-width:210px}
  #sb.hide{width:0;min-width:0}
  .leaflet-popup-content-wrapper{max-width:min(400px, calc(100vw - 80px))!important;width:min(400px, calc(100vw - 80px))!important}
}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div id="hd">
    <h1>🍽 <em>마케팅</em> 식당 지도</h1>
    <div class="hbs">
      <div class="conn-status"><div class="conn-dot" id="connDot"></div><span id="connText">연결 중...</span></div>

    </div>
  </div>

  <!-- 필터바 -->
  <div id="fbar">
    <div class="frow">
      <div class="fg"><div class="fl">지역</div><div class="chips" id="rc"></div></div>
      <div class="fg"><div class="fl">메뉴</div><div class="chips" id="mc"></div></div>
    </div>
  </div>

  <!-- 검색바 -->
  <div id="searchbar">
    <span style="font-size:13px">🔍</span>
    <input type="text" id="searchInput" placeholder="식당명 검색">
    <button class="sclear" id="searchClear" title="지우기">×</button>
  </div>

  <!-- 메인 -->
  <div id="main">
    <div id="sb">
      <div id="sbh"><b>식당 목록</b><span id="cnt">0개</span></div>
      <div id="rl"></div>
      <div id="nores">조건에 맞는 식당이 없습니다</div>
    </div>
    <div id="togwrap"><button id="tog">◀</button></div>
    <div id="mw">
      <div id="map"></div>
      <div id="badge">0개</div>
      <div id="noDataMsg"><p>🔗 Firebase URL을 연결하면<br>실시간으로 식당 데이터를 볼 수 있어요</p></div>
    </div>
  </div>
</div>

<!-- Firebase 연결 설정 모달 -->
<div id="fbSetupOverlay">
  <div id="fbSetupBox">
    <h2>🔗 실시간 데이터 연결</h2>
    <p>편집용 페이지와 같은 Firebase URL을 입력하면<br>
    실시간으로 최신 식당 정보를 볼 수 있어요.<br>
    <a href="https://console.firebase.google.com" target="_blank" style="color:#2563eb">console.firebase.google.com</a></p>
    <input class="fbi" id="fbi" placeholder="https://xxx-default-rtdb.firebaseio.com" type="url">
    <div class="sbr">
      <button class="fbok" id="fbOk">연결하기</button>
      <button class="fbsk" id="fbSkip">나중에</button>
    </div>
  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<div id="toast"></div>

<script>
(function(){
  // Firebase SDK 로드
  var s1=document.createElement('script');s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';document.head.appendChild(s1);
  var s2=document.createElement('script');s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';document.head.appendChild(s2);

  var MC={"한식":"#e84f4f","중식":"#e8a838","일식":"#3b82f6","양식":"#8b5cf6","고기":"#ef6c00","기타":"#6b7280"};
  var ME={"한식":"🍚","중식":"🥢","일식":"🍣","양식":"🍽","고기":"🥩","기타":"🍷"};
  var REGIONS=["중구","용산구","종로구","서초구","강남구","서대문구","관악구","마포구","영등포구","송파구"];
  var MENUS=["한식","중식","일식","양식","고기","기타"];
  var RC={"중구":[37.564,126.9975],"용산구":[37.5326,126.9856],"종로구":[37.5735,126.9788],"서초구":[37.4837,127.0324],"강남구":[37.4979,127.0276],"서대문구":[37.5791,126.9368],"관악구":[37.4784,126.9516],"마포구":[37.5522,126.9092],"영등포구":[37.5264,126.8964],"송파구":[37.5145,127.1059]};

  var DATA=[], filtered=[], selR=new Set(), selM=new Set();
  var map, markers={}, activeId=null, dbRef=null, sbOn=true;

  function $id(id){return document.getElementById(id);}
  function showT(msg){var t=$id('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
  function lk(t){if(!t)return'';return t.replace(/(https?:\/\/[^\s\n<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}

  // 연결 상태 표시
  function setConnStatus(state){
    var dot=$id('connDot'), txt=$id('connText');
    if(state==='live'){dot.className='conn-dot live';txt.textContent='실시간 연결';}
    else if(state==='loading'){dot.className='conn-dot';dot.style.background='#f59e0b';txt.textContent='연결 중...';}
    else{dot.className='conn-dot';dot.style.background='#6b7280';txt.textContent='미연결';}
  }

  // 지도 초기화
  function initMap(){
    map=L.map('map',{center:[37.555,126.977],zoom:13,zoomControl:true,preferCanvas:true,tap:false});
    var vw=L.tileLayer('https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',{
      attribution:'© 국토지리정보원',maxZoom:19,minZoom:6,keepBuffer:2,updateWhenIdle:true,crossOrigin:true,
      errorTileUrl:'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
    });
    var osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19,keepBuffer:2,updateWhenIdle:true});
    var ve=0;
    vw.on('tileerror',function(){ve++;if(ve>5&&map.hasLayer(vw)){map.removeLayer(vw);osm.addTo(map);}});
    vw.addTo(map);
    map.setMaxBounds([[36.5,126.0],[38.2,128.5]]);
    renderMarkers();
  }

  // 팝업 HTML (수정 버튼 없음 - 보기전용)
  function buildPopHTML(r){
    var c=MC[r.menu]||'#6b7280', e=ME[r.menu]||'🍽';
    var rp=r.room==='O'?'<span class="ppl pply">🚪 룸가능</span>':'<span class="ppl ppln">🚫 룸없음</span>';
    var cp=r.cork==='O'?'<span class="ppl pply">🍷 콜키지가능</span>':r.cork==='X'?'<span class="ppl ppln">🍷 콜키지불가</span>':'<span class="ppl pplu">🍷 확인예정</span>';
    var nb=r.naver&&r.naver.indexOf('http')===0?'<a class="nb" href="'+r.naver+'" target="_blank">🟢 네이버</a>':'';
    return '<div class="pph">'
      +'<h3>'+e+' '+r.name+'</h3>'
      +'<div class="ppbgs"><span class="ppbg ppbgr">'+r.region+'</span>'
      +'<span class="ppbg" style="background:'+c+';color:#fff">'+r.menu+' · '+r.detail+'</span></div></div>'
      +'<div class="ppb">'
      +(r.addr?'<div class="ppr"><span>📍 </span><span>'+r.addr+'</span></div>':'')
      +(r.station?'<div class="ppr"><span>🚇 </span><span>'+r.station+'</span></div>':'')
      +(r.tel?'<div class="ppr"><span>📞 </span><span>'+r.tel+'</span></div>':'')
      +'<div class="ppls">'+rp+cp+'</div>'
      +(r.memo?'<div class="ppsl">📝 메모</div><div class="ppmo">'+lk(r.memo)+'</div>':'')
      +(r.review?'<div class="ppsl">💬 코멘트</div><div class="pprv">'+lk(r.review)+'</div>':'')
      +'</div>'
      +'<div class="ppft">'+nb+'</div>';
  }

  function mkIcon(menu,active){
    var c=MC[menu]||'#6b7280', e=ME[menu]||'🍽', s=active?40:30;
    return L.divIcon({className:'',
      html:'<div style="width:'+s+'px;height:'+s+'px;background:'+c+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:'+(active?'3px':'2px')+' solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:'+(active?16:12)+'px;line-height:1">'+e+'</span></div>',
      iconSize:[s,s],iconAnchor:[s/2,s]});
  }

  function renderMarkers(){
    Object.values(markers).forEach(function(m){map.removeLayer(m);});
    markers={};
    filtered.forEach(function(r){
      var mk=L.marker([r.lat,r.lng],{icon:mkIcon(r.menu,r.id===activeId),zIndexOffset:r.id===activeId?100:0}).addTo(map);
      mk.bindPopup(buildPopHTML(r),{maxWidth:400,minWidth:280,autoPan:false,closeButton:true});
      mk.on('click',function(){
        var cid=r.id; activeId=cid;
        document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('on');});
        var li=$id('li-'+cid);
        if(li){li.classList.add('on');var rl=$id('rl');if(rl){rl.scrollTop=li.offsetTop-rl.offsetTop-60;}}
        renderMarkers();
        setTimeout(function(){if(markers[cid])markers[cid].openPopup();},50);
      });
      // 팝업 터치 처리
      (function(rid){
        mk.on('popupopen',function(){
          var popup=mk.getPopup();if(!popup)return;
          var el=popup.getElement();if(!el)return;
          var wrapper=el.querySelector('.leaflet-popup-content-wrapper');if(!wrapper)return;
          var startX,startY,direction=null;
          wrapper.addEventListener('touchstart',function(e){
            if(e.target.closest('button,a'))return;
            var t=e.touches[0];startX=t.clientX;startY=t.clientY;direction=null;
          },{passive:true});
          wrapper.addEventListener('touchmove',function(e){
            if(e.target.closest('button,a'))return;
            var t=e.touches[0];var dx=t.clientX-startX;var dy=t.clientY-startY;
            if(!direction){
              if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.5){direction='h';}
              else if(Math.abs(dy)>8){direction='v';return;}
              else{return;}
            }
            if(direction==='v')return;
            map.panBy([-dx*0.8,0],{animate:false,duration:0});
            startX=t.clientX;startY=t.clientY;
          },{passive:true});
          wrapper.addEventListener('touchend',function(){direction=null;},{passive:true});
        });
      })(r.id);
      markers[r.id]=mk;
    });
    $id('badge').textContent=filtered.length+'개';
    // 데이터 없음 메시지
    $id('noDataMsg').style.display=(DATA.length===0)?'block':'none';
  }

  function selFromList(id){
    activeId=id;
    document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('on');});
    var li=$id('li-'+id);
    if(li){li.classList.add('on');var rl=$id('rl');if(rl){rl.scrollTop=li.offsetTop-rl.offsetTop-60;}}
    var r=DATA.find(function(x){return x.id===id;});if(!r)return;
    renderMarkers();
    if(r.lat&&r.lng){map.setView([r.lat,r.lng],16,{animate:true,duration:0.5});}
    setTimeout(function(){if(markers[id])markers[id].openPopup();},550);
  }

  function menuCls(m){
    var map2={'한식':'tgm-h','중식':'tgm-c','일식':'tgm-j','양식':'tgm-y','고기':'tgm-g','기타':'tgm-e'};
    return map2[m]||'';
  }

  function buildChips(){
    $id('rc').innerHTML=REGIONS.map(function(v){
      return'<span class="chip'+(selR.has(v)?' ar':'')+'" data-v="'+v+'">'+v+'</span>';
    }).join('');
    $id('mc').innerHTML=MENUS.map(function(v){
      return'<span class="chip'+(selM.has(v)?' am':'')+'" data-v="'+v+'">'+v+'</span>';
    }).join('');
  }

  function applySearch(){
    var inp=$id('searchInput');
    var q=inp?inp.value.trim().toLowerCase():'';
    map.closePopup();activeId=null;
    filtered=DATA.filter(function(r){
      var regionOk=(selR.size===0||selR.has(r.region));
      var menuOk=(selM.size===0||selM.has(r.menu));
      var searchOk=!q||(r.name&&r.name.toLowerCase().indexOf(q)>=0);
      return regionOk&&menuOk&&searchOk;
    });
    renderList();renderMarkers();
  }

  function applyF(){
    map.closePopup();activeId=null;
    var dataRegions=[];
    DATA.forEach(function(r){if(r.region&&r.region!=='기타'&&dataRegions.indexOf(r.region)<0){dataRegions.push(r.region);}});
    var changed=false;
    dataRegions.forEach(function(rg){if(REGIONS.indexOf(rg)<0){REGIONS.push(rg);changed=true;}});
    for(var i=REGIONS.length-1;i>=0;i--){
      if(dataRegions.indexOf(REGIONS[i])<0){selR.delete(REGIONS[i]);REGIONS.splice(i,1);changed=true;}
    }
    if(changed)buildChips();
    applySearch();
  }

  function renderList(){
    $id('cnt').textContent=filtered.length+'개';
    var nr=$id('nores');
    if(!filtered.length){nr.style.display='block';$id('rl').innerHTML='';return;}
    nr.style.display='none';
    var sorted=filtered.slice().sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
    $id('rl').innerHTML=sorted.map(function(r){
      return'<div class="ri'+(r.id===activeId?' on':'')+'" id="li-'+r.id+'" data-id="'+r.id+'">'
        +'<div class="rn">'+r.name+'</div>'
        +'<div class="rt"><span class="tg tgr">'+r.region+'</span><span class="tg tgm '+menuCls(r.menu)+'">'+r.menu+'</span>'
        +'<span style="font-size:10px;color:#9ca3af;margin-left:2px">'+r.detail+'</span></div></div>';
    }).join('');
    $id('rl').onclick=function(e){var el=e.target.closest('.ri');if(el)selFromList(el.dataset.id);};
  }

  function togSB(){
    sbOn=!sbOn;
    $id('sb').classList.toggle('hide',!sbOn);
    $id('tog').innerHTML=sbOn?'◀':'▶';
    setTimeout(function(){map.invalidateSize();},280);
  }

  // Firebase 연결
  function initFB(url){
    if(typeof firebase==='undefined'){setTimeout(function(){initFB(url);},500);return;}
    setConnStatus('loading');
    $id('loadingOverlay').classList.add('show');
    try{
      var app=firebase.initializeApp({databaseURL:url},'viewer_'+Date.now());
      var db=firebase.database(app);
      dbRef=db.ref('/foodiMap');
      dbRef.child('restaurants').on('value',function(snap){
        $id('loadingOverlay').classList.remove('show');
        var v=snap.val();
        if(v){DATA=Object.values(v);setConnStatus('live');applyF();}
        else{DATA=[];setConnStatus('live');applyF();showT('📭 아직 등록된 식당이 없어요');}
      },function(err){
        $id('loadingOverlay').classList.remove('show');
        setConnStatus('disconnected');
        showT('⚠️ 연결 오류: '+err.message);
      });
    }catch(e){
      $id('loadingOverlay').classList.remove('show');
      setConnStatus('disconnected');
      showT('⚠️ '+e.message);
    }
  }

  function openFBSetup(){$id('fbi').value=localStorage.getItem('viewer_fb_url')||'';$id('fbSetupOverlay').classList.add('open');}

  function connectFB(){
    var url=$id('fbi').value.trim();
    if(url.indexOf('https://')!==0){showT('⚠️ Firebase URL 확인');return;}
    localStorage.setItem('viewer_fb_url',url);
    $id('fbSetupOverlay').classList.remove('open');
    initFB(url);
  }

  document.addEventListener('DOMContentLoaded',function(){
    buildChips();
    filtered=DATA.slice();
    initMap();
    renderList();

    $id('tog').addEventListener('click',togSB);

    document.getElementById('rc').addEventListener('click',function(e){
      var el=e.target;if(!el.classList.contains('chip'))return;
      var v=el.dataset.v;
      if(selR.has(v)){selR.delete(v);el.classList.remove('ar');}else{selR.add(v);el.classList.add('ar');}
      applySearch();
    });
    document.getElementById('mc').addEventListener('click',function(e){
      var el=e.target;if(!el.classList.contains('chip'))return;
      var v=el.dataset.v;
      if(selM.has(v)){selM.delete(v);el.classList.remove('am');}else{selM.add(v);el.classList.add('am');}
      applySearch();
    });

    var sinp=document.getElementById('searchInput');
    var sclr=document.getElementById('searchClear');
    if(sinp){sinp.addEventListener('input',function(){applySearch();});}
    if(sclr){sclr.addEventListener('click',function(){sinp.value='';sinp.focus();applySearch();});}

    $id('fbOk').addEventListener('click',connectFB);
    $id('fbSkip').addEventListener('click',function(){$id('fbSetupOverlay').classList.remove('open');});
    $id('fbSetupOverlay').addEventListener('click',function(e){if(e.target===$id('fbSetupOverlay'))$id('fbSetupOverlay').classList.remove('open');});

    window.addEventListener('resize',function(){if(map)map.invalidateSize();});

    // 1순위: URL 파라미터 ?fb=... 로 자동 연결 (공유 링크)
    var params=new URLSearchParams(window.location.search);
    var fbParam=params.get('fb');
    if(fbParam&&fbParam.indexOf('https://')===0){
      localStorage.setItem('viewer_fb_url',fbParam);
      initFB(fbParam);
    }
    // 2순위: 이전에 저장된 URL
    else{
      var saved=localStorage.getItem('viewer_fb_url');
      if(saved){initFB(saved);}
      else{setTimeout(function(){openFBSetup();},600);}
    }
  });
})();
</script>
</body>
</html>
