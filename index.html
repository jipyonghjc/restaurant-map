html,body{height:100%;width:100%;font-family:sans-serif;overflow:hidden;position:fixed;top:0;left:0}
#app{display:flex;flex-direction:column;height:100%;width:100%;position:fixed;top:0;left:0;right:0;bottom:0}

.ppbg{font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px}

.ppls{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}

#md{background:#fff;border-radius:14px;width:460px;max-width:calc(100vw - 16px);margin-bottom:20px}

.bsv{background:#2563eb;color:#fff;border:none;cursor:pointer;padding:10px 20px;border-radius:7px;font-size:13px;font-weight:700}
.bcn{background:#f3f4f6;color:#555;border:none;cursor:pointer;padding:10px 14px;border-radius:7px;font-size:13px}
.bdl{background:#fef2f2;color:#dc2626;border:none;cursor:pointer;padding:10px 12px;border-radius:7px;font-size:13px;margin-right:auto}

.sbr{display:flex;gap:6px}
.fbok{flex:1;background:#2563eb;color:#fff;border:none;padding:9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
.fbsk{background:#f3f4f6;color:#555;border:none;padding:9px 12px;border-radius:7px;font-size:12px;cursor:pointer}

<body>
<div id="app">

    <button class="hb hbg" id="shareBtn">&#128279; 공유</button>

</div>

  <div class="frow">
    <div class="fg"><div class="fl">지역</div><div class="chips" id="rc"></div></div>
    <div class="fg"><div class="fl">메뉴</div><div class="chips" id="mc"></div></div>
  </div>
</div>
<div id="searchbar">
  <span style="font-size:13px">&#128269;</span>
  <input type="text" id="searchInput" placeholder="식당명 검색란">

</div>

  <div id="mw"><div id="map"></div><div id="badge">0개</div></div>
</div>
</div>
<div id="moOverlay">
<div id="md">

    </div>
    <div class="fg2"><label class="lb">네이버링크</label><input class="fi" id="enav" type="url"></div>
    <div class="fg2"><label class="lb">메모</label><textarea class="ft" id="emo"></textarea></div>
    <div class="fg2"><label class="lb">코멘트</label><textarea class="ft" id="erv"></textarea></div>
    <div class="fg2">

function renderMarkers(){
  Object.values(markers).forEach(function(m){map.removeLayer(m);});
  markers={};
  filtered.forEach(function(r){
    var mk=L.marker([r.lat,r.lng],{
      icon:mkIcon(r.menu,r.id===activeId),
      zIndexOffset:r.id===activeId?100:0
    }).addTo(map);
    mk.bindPopup(buildPopHTML(r),{
      maxWidth:400,minWidth:280,
      autoPan:false,
      closeButton:true
    });
    mk.on('click',function(){
      var clickedId=r.id;
      activeId=clickedId;
      document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('on');});
      var li=$id('li-'+clickedId);
      if(li){
        li.classList.add('on');
        // 사이드바 내부 스크롤만
        var rl=$id('rl');
        if(rl){rl.scrollTop=li.offsetTop-rl.offsetTop-60;}
      }
      renderMarkers();
      setTimeout(function(){
        if(markers[clickedId])markers[clickedId].openPopup();
      },50);
    });
    // popupopen: 수정버튼 연결 + 팝업 터치를 지도로 전달
    (function(rid){
      mk.on('popupopen',function(){
        var popup=mk.getPopup();
        if(!popup)return;
        var el=popup.getElement();
        if(!el)return;

        // 수정 버튼 연결
        var btn=el.querySelector('.eb');
        if(btn){
          btn.onclick=null;
          btn.addEventListener('click',function(e){
            e.stopPropagation();
            openEdit(rid);
          });
        }

        // 좌우 드래그만 지도로 전달, 상하는 팝업 스크롤
        var wrapper=el.querySelector('.leaflet-popup-content-wrapper');
        if(!wrapper)return;

        var startX,startY,startMapX,startMapY,direction=null;
        var mapCont=map.getContainer();

        wrapper.addEventListener('touchstart',function(e){
          if(e.target.closest('button,a'))return;
          var t=e.touches[0];
          startX=t.clientX; startY=t.clientY; direction=null;
          // 지도 드래그 시작 준비
          var rect=mapCont.getBoundingClientRect();
          startMapX=t.clientX-rect.left;
          startMapY=t.clientY-rect.top;
        },{passive:true});

        wrapper.addEventListener('touchmove',function(e){
          if(e.target.closest('button,a'))return;
          var t=e.touches[0];
          var dx=t.clientX-startX;
          var dy=t.clientY-startY;
          // 방향 첫 판별
          if(!direction){
            if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.5){
              direction='h'; // 좌우
            } else if(Math.abs(dy)>8){
              direction='v'; // 상하 → 팝업 스크롤
              return;
            } else {
              return;
            }
          }
          if(direction==='v')return;
          // 좌우: 지도 pan
          map.panBy([-dx*0.8, 0],{animate:false,duration:0});
          startX=t.clientX; startY=t.clientY;
        },{passive:true});

        wrapper.addEventListener('touchend',function(e){
          direction=null;
        },{passive:true});
      });
    })(r.id);
    markers[r.id]=mk;
  });
  $id('badge').textContent=filtered.length+'\uac1c';
}

function cleanAddrForGeo(addr){
  if(!addr)return '';
  var a=addr.replace(/\n/g,' ').trim();
  if(!a.startsWith('서울'))a='서울 '+a;
  // 도로명+번지만 추출 (건물명/층수 제거)
  var m=a.match(/(서울\s+\S+[구군]\s+\S+[로길]\s*\d+(?:-\d+)?)/);
  if(m)return m[1].trim();
  // 공백 기준 앞 토큰들만
  var parts=a.split(/\s+/);
  var lastNum=3;
  for(var i=0;i<Math.min(parts.length,6);i++){if(/^\d/.test(parts[i]))lastNum=i;}
  return parts.slice(0,lastNum+1).join(' ');
}

function autoGeocode(items, key){
  var total=items.length, done=0;
  function next(idx){
    if(idx>=total){
      renderMarkers();renderList();
      showT('✅ 위치 설정 완료 ('+total+'개)');
      return;
    }
    var r=items[idx];
    var cleaned=cleanAddrForGeo(r.addr||'');
    var fullAddr=r.addr&&!r.addr.startsWith('서울')?'서울 '+r.addr:r.addr||'';
    // 1차: 정제 주소
    function tryAddr(q, fallback){
      if(!q){fallback();return;}
      fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(q),{
        headers:{'Authorization':'KakaoAK '+key}
      }).then(function(res){return res.json();})
      .then(function(d){
        if(d.documents&&d.documents.length){
          r.lat=parseFloat(d.documents[0].y);r.lng=parseFloat(d.documents[0].x);
          done++;if(done%5===0)showT('📍 위치 설정 중... ('+done+'/'+total+')');
          setTimeout(function(){next(idx+1);},80);
        }else{fallback();}
      }).catch(function(){fallback();});
    }
    // 2차: 원본 주소
    function tryFull(){
      if(fullAddr&&fullAddr!==cleaned){tryAddr(fullAddr,tryKeyword);}
      else{tryKeyword();}
    }
    // 3차: 식당명 키워드
    function tryKeyword(){
      var kw=r.name+(r.region?' '+r.region:'');
      fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(kw)+'&category_group_code=FD6',{
        headers:{'Authorization':'KakaoAK '+key}
      }).then(function(res){return res.json();})
      .then(function(d){
        if(d.documents&&d.documents.length){
          r.lat=parseFloat(d.documents[0].y);r.lng=parseFloat(d.documents[0].x);
        }
        done++;if(done%5===0)showT('📍 위치 설정 중... ('+done+'/'+total+')');
        setTimeout(function(){next(idx+1);},80);
      }).catch(function(){
        done++;setTimeout(function(){next(idx+1);},80);
      });
    }
    tryAddr(cleaned, tryFull);
  }
  next(0);
}

  var q=inp?inp.value.trim().toLowerCase():'';
  map.closePopup();activeId=null;
  filtered=DATA.filter(function(r){
    var regionOk=(selR.size===0||selR.has(r.region));
    var menuOk=(selM.size===0||selM.has(r.menu));
    var searchOk=!q||(r.name&&r.name.toLowerCase().indexOf(q)>=0);
    return regionOk&&menuOk&&searchOk;
  });
  renderList();renderMarkers();
}
function applyF(){
  map.closePopup();activeId=null;
  // 현재 DATA에 존재하는 지역 목록 추출
  var dataRegions=[];
  DATA.forEach(function(r){
    if(r.region&&r.region!=='기타'&&dataRegions.indexOf(r.region)<0){
      dataRegions.push(r.region);
    }
  });
  // 새 지역 추가 + 없어진 지역 제거
  var changed=false;
  dataRegions.forEach(function(rg){
    if(REGIONS.indexOf(rg)<0){REGIONS.push(rg);changed=true;}
  });
  for(var i=REGIONS.length-1;i>=0;i--){
    if(dataRegions.indexOf(REGIONS[i])<0){
      selR.delete(REGIONS[i]);
      REGIONS.splice(i,1);
      changed=true;
    }
  }
  if(changed)buildChips();
  applySearch();
}
function renderList(){
  $id('cnt').textContent=filtered.length+'\uac1c';
  var nr=$id('nores');
  if(!filtered.length){nr.style.display='block';$id('rl').innerHTML='';return;}
  nr.style.display='none';
  // 가나다 순 정렬
  var sorted=filtered.slice().sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  $id('rl').innerHTML=sorted.map(function(r){
    return'<div class="ri'+(r.id===activeId?' on':'')+'" id="li-'+r.id+'" data-id="'+r.id+'">'
      +'<div class="rn">'+r.name+'</div>'
      +'<div class="rt"><span class="tg tgr">'+r.region+'</span><span class="tg tgm '+menuCls(r.menu)+'">'+r.menu+'</span>'
      +'<span style="font-size:10px;color:#9ca3af;margin-left:2px">'+r.detail+'</span></div></div>';
  }).join('');

}

var pinMap=null,pinMarker=null,pendingLat=null,pendingLng=null;
function initPinMap(lat,lng){
  var wrap=$id('pinMapWrap');
  if(!wrap)return;
  wrap.style.display='block';
  if(!pinMap){
    pinMap=L.map('pinMap',{zoomControl:true,tap:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(pinMap);
    pinMap.on('click',function(e){
      var ll=e.latlng;
      pendingLat=ll.lat;pendingLng=ll.lng;
      if(pinMarker)pinMarker.setLatLng(ll);
      else pinMarker=L.marker(ll,{draggable:true}).addTo(pinMap);
      pinMarker.off('dragend').on('dragend',function(ev){
        pendingLat=ev.target.getLatLng().lat;
        pendingLng=ev.target.getLatLng().lng;
        updatePinTxt();
      });
      updatePinTxt();
    });
  }
  var clat=lat||37.555,clng=lng||126.977;
  pinMap.setView([clat,clng],16);
  setTimeout(function(){pinMap.invalidateSize();},50);
  if(lat&&lng){
    pendingLat=lat;pendingLng=lng;
    if(pinMarker)pinMarker.setLatLng([lat,lng]);
    else pinMarker=L.marker([lat,lng],{draggable:true}).addTo(pinMap);
    pinMarker.off('dragend').on('dragend',function(ev){
      pendingLat=ev.target.getLatLng().lat;
      pendingLng=ev.target.getLatLng().lng;
      updatePinTxt();
    });
    updatePinTxt();
  }
}
function updatePinTxt(){
  var el=$id('pinCoordTxt');
  if(el&&pendingLat)el.textContent='('+pendingLat.toFixed(5)+', '+pendingLng.toFixed(5)+')';
}

function loadXL(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){showT('\u26a0\ufe0f \ub370\uc774\ud130 \uc5c6\uc74c');return;}
      var keys=Object.keys(rows[0]);
      var fc=function(){for(var i=0;i<arguments.length;i++){if(keys.indexOf(arguments[i])>=0)return arguments[i];}return null;};
      var nC=fc('\uc0c1 \ud638','\uc0c1\ud638','\uc0c1\ud638\uba85');
      if(!nC){showT('\u26a0\ufe0f \uc0c1\ud638\uba85 \ucee8\ub7fc \uc5c6\uc74c');return;}
      var kakaoKey=localStorage.getItem('kakao_geo_key')||'';
      var g2=function(row){var k=fc.apply(null,Array.prototype.slice.call(arguments,1));var v=k?row[k]:'';return v?String(v).replace(/\n{3,}/g,'\n').replace(/^nan$/,'').trim():'';};
      var rawRows=rows.filter(function(r){return r[nC];}).map(function(row,i){
        var nm=String(row[nC]||'').trim(),rg=String(row[fc('지역')||'']||'').trim();
        var mr=String(row[fc('메뉴')||'']||'').trim(),mn='기타';
        if(mr.indexOf('한식')>=0)mn='한식';
        else if(mr.indexOf('중식')>=0)mn='중식';
        else if(mr.indexOf('일식')>=0)mn='일식';
        else if(mr.indexOf('양식')>=0)mn='양식';
        else if(mr.indexOf('고기')>=0)mn='고기';
        var dm=mr.match(/[\(\uff08](.+?)[\)\uff09]/);var dt=dm?dm[1]:mr.trim();
        // 주소 컬럼 최대한 넓게 탐색
        var latCol=fc('위도','lat','latitude','LAT','Lat');
        var lngCol=fc('경도','lng','longitude','LNG','Lng');
        var addrCol=fc('위치','주소','addr','address','도로명주소','지번주소','소재지');
        var addr=addrCol?String(row[addrCol]||'').replace(/^nan$/,'').trim():'';
        var ct=RC[rg]||[37.555,126.977];
        return{id:'rx'+i+'_'+Date.now(),name:nm,region:rg,menu:mn,detail:dt,
          addr:addr,
          tel:String(row[fc('전화번호','전화')||'']||'').replace(/\n/g,' ').replace(/^nan$/,'').trim(),
          station:String(row[fc('인근역','역')||'']||'').replace(/\n/g,'/').replace(/^nan$/,'').trim(),
          room:g2(row,'룸 여부','룸여부'),cork:g2(row,'콜키지'),
          naver:g2(row,'네이버 링크','네이버링크'),
          memo:g2(row,'메모'),review:g2(row,'코멘트(리뷰)','코멘트'),
          _addr:addr,_nm:nm,_rg:rg,_ct:ct,
          lat:(latCol&&row[latCol])?parseFloat(row[latCol]):null,
          lng:(lngCol&&row[lngCol])?parseFloat(row[lngCol]):null};
      });

      // 주소에서 순수 도로명 부분만 추출 (건물명/층수 등 제거)
      function cleanAddr(addr){
        if(!addr)return '';
        // 줄바꿈 제거
        var a=addr.replace(/\n/g,' ').trim();
        // "서울 중구 을지로 30 롯데호텔서울 37층" → "서울 중구 을지로 30" 추출
        // 숫자(번지/길번호) 이후 한글 건물명/층수 패턴 제거
        // 패턴: 시/구/로/길 + 숫자 뒤에 오는 불필요 텍스트
        var m=a.match(/^((?:서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)?\s*\S+[시도]\s*)?(.*?(?:[로길]\s*\d+(?:-\d+)?|\d+(?:-\d+)?\s*번지))/);
        if(m&&m[0]&&m[0].length>5){
          return m[0].trim();
        }
        // 패턴 매칭 실패 시: 공백 기준으로 앞 4~5 토큰만 사용
        var parts=a.split(/\s+/);
        // "서울 서초구 반포대로30길 66 상은빌딩 1층" → 앞 4개 토큰
        if(parts.length>4){
          // 숫자로만 이루어진 토큰 위치 찾기 (번지수)
          var lastNumIdx=3;
          for(var i=0;i<Math.min(parts.length,6);i++){
            if(/^\d/.test(parts[i]))lastNumIdx=i;
          }
          return parts.slice(0,lastNumIdx+1).join(' ');
        }
        return a;
      }

      // 카카오 Geocoding: 주소정제 → 주소검색 → 키워드검색 3단 fallback
      function kakaoGeoOne(r,key,cb){
        if(!r._addr&&!r._nm){cb();return;}

        var rawAddr=r._addr||'';
        var cleanedAddr=cleanAddr(rawAddr);

        // 1차: 정제된 주소로 검색
        function tryAddr(q,next){
          if(!q){next();return;}
          fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(q),{
            headers:{'Authorization':'KakaoAK '+key}
          }).then(function(res){return res.json();})
          .then(function(data){
            if(data.documents&&data.documents.length){
              r.lat=parseFloat(data.documents[0].y);
              r.lng=parseFloat(data.documents[0].x);
              cb();
            } else {next();}
          }).catch(function(){next();});
        }

        // 2차: 원본 주소로 검색
        function tryRawAddr(){
          if(rawAddr&&rawAddr!==cleanedAddr){
            tryAddr(rawAddr,tryKeyword);
          } else {tryKeyword();}
        }

        // 3차: 식당명으로 키워드 검색
        function tryKeyword(){
          var kw=r._nm+(r._rg?' '+r._rg:'');
          fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(kw)+'&category_group_code=FD6',{
            headers:{'Authorization':'KakaoAK '+key}
          }).then(function(res){return res.json();})
          .then(function(data){
            if(data.documents&&data.documents.length){
              r.lat=parseFloat(data.documents[0].y);
              r.lng=parseFloat(data.documents[0].x);
            }
            cb();
          }).catch(function(){cb();});
        }

        tryAddr(cleanedAddr,tryRawAddr);
      }

      function finalizeData(rows){
        rows.forEach(function(r){
          if(!r.lat||!r.lng){
            var ct=r._ct||[37.555,126.977];
            r.lat=ct[0]+(Math.random()-.5)*.008;
            r.lng=ct[1]+(Math.random()-.5)*.008;
          }
          delete r._addr;delete r._nm;delete r._rg;delete r._ct;
        });
        DATA=rows;
        if(dbRef){var obj={};DATA.forEach(function(r){obj[r.id]=r;});dbRef.child('restaurants').set(obj);}
        selR.clear();selM.clear();document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('ar','am');});
        applyF();showT('✅ '+DATA.length+'개 업데이트 완료');
      }

      if(kakaoKey){
        showT('📍 위치 변환 중... ('+rawRows.length+'개)');
        var done=0,total=rawRows.length;
        // 동시 요청 폭탄 방지: 5개씩 순차 처리
        function processNext(idx){
          if(idx>=total){finalizeData(rawRows);return;}
          var batch=rawRows.slice(idx,idx+5);
          var bdone=0;
          batch.forEach(function(r){
            kakaoGeoOne(r,kakaoKey,function(){
              bdone++;
              if(bdone===batch.length){
                done+=batch.length;
                showT('📍 위치 변환 중... ('+done+'/'+total+')');
                setTimeout(function(){processNext(idx+5);},120); // 요청 간격
              }
            });
          });
        }
        processNext(0);
      } else {
        finalizeData(rawRows);
        setTimeout(function(){showT('💡 📍위치키 버튼에 카카오 API 키 등록 시 정확한 위치 자동 설정');},2000);
      }
    }catch(err){showT('\u26a0\ufe0f '+err.message);}
  };
  reader.readAsArrayBuffer(file);event.target.value='';
}

function initFB(url){

  try{
    var app=firebase.initializeApp({databaseURL:url},'app_'+Date.now());
    var db=firebase.database(app);dbRef=db.ref('/foodiMap');
    dbRef.child('restaurants').on('value',function(snap){var v=snap.val();if(v){DATA=Object.values(v);applyF();}},function(){});
    showT('\ud83d\udd17 \uc5f0\uacb0 \uc644\ub8cc!');
  }catch(e){showT('\u26a0\ufe0f '+e.message);}
}

      if(showing){
        wrap.style.display='none';
        pinTogBtn.textContent='지도에서 클릭';
      } else {
        wrap.style.display='block';
        pinTogBtn.textContent='닫기';
        var ex=DATA.find(function(x){return x.id===$id('eid').value;});
        setTimeout(function(){initPinMap(ex?ex.lat:pendingLat,ex?ex.lng:pendingLng);},50);
      }
    });
  }
  var s=localStorage.getItem('fb_url');if(s)initFB(s);
});
})();
</script>
