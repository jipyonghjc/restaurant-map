html,body{height:100%;width:100%;font-family:sans-serif;overflow:hidden;position:fixed;top:0;left:0}
#app{display:flex;flex-direction:column;height:100%;width:100%;position:fixed;top:0;left:0;right:0;bottom:0}

.ppb{padding:8px 14px}

.ppls{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}

#md{background:#fff;border-radius:14px;width:460px;max-width:calc(100vw - 16px);margin-bottom:20px}

.mbody{padding:13px 15px}

.bsv{background:#2563eb;color:#fff;border:none;cursor:pointer;padding:10px 20px;border-radius:7px;font-size:13px;font-weight:700}
.bcn{background:#f3f4f6;color:#555;border:none;cursor:pointer;padding:10px 14px;border-radius:7px;font-size:13px}
.bdl{background:#fef2f2;color:#dc2626;border:none;cursor:pointer;padding:10px 12px;border-radius:7px;font-size:13px;margin-right:auto}

.sbr{display:flex;gap:6px}
.fbok{flex:1;background:#2563eb;color:#fff;border:none;padding:9px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
.fbsk{background:#f3f4f6;color:#555;border:none;padding:9px 12px;border-radius:7px;font-size:12px;cursor:pointer}

<body>
<div id="app">

</div>

  <div class="frow">
    <div class="fg"><div class="fl">지역</div><div class="chips" id="rc"></div></div>

  </div>
</div>
<div id="searchbar">

</div>
</div>
<div id="moOverlay">
<div id="md">

    </div>

    <div class="fg2"><label class="lb">메모</label><textarea class="ft" id="emo"></textarea></div>
    <div class="fg2"><label class="lb">코멘트</label><textarea class="ft" id="erv"></textarea></div>

var filtered=[],selR=new Set(),selM=new Set();

function initMap(){
  map=L.map('map',{
    center:[37.555,126.977],zoom:13,
    zoomControl:true,
    preferCanvas:true,
    tap:false
  });
  var vw=L.tileLayer('https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',{
    attribution:'\u00a9 \uad6d\ud1a0\uc9c0\ub9ac\uc815\ubcf4\uc6d0',maxZoom:19,minZoom:6,
    keepBuffer:2,updateWhenIdle:true,crossOrigin:true,
    errorTileUrl:'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
  });
  var osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'\u00a9 OpenStreetMap',maxZoom:19,keepBuffer:2,updateWhenIdle:true
  });
  var ve=0;
  vw.on('tileerror',function(){ve++;if(ve>5&&map.hasLayer(vw)){map.removeLayer(vw);osm.addTo(map);}});
  vw.addTo(map);
  map.setMaxBounds([[36.5,126.0],[38.2,128.5]]);
  renderMarkers();
}

  var nb=r.naver&&r.naver.indexOf('http')===0?'<a class="nb" href="'+r.naver+'" target="_blank">\ud83d\udfe2 \ub124\uc774\ubc84</a>':'';

function mkIcon(menu,active){
  var c=MC[menu]||'#6b7280',e=ME[menu]||'\ud83c\udf7d',s=active?40:30;
  return L.divIcon({className:'',
    html:'<div style="width:'+s+'px;height:'+s+'px;background:'+c+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:'+(active?'3px':'2px')+' solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:'+(active?16:12)+'px;line-height:1">'+e+'</span></div>',
    iconSize:[s,s],iconAnchor:[s/2,s]});
}

function renderMarkers(){
  Object.values(markers).forEach(function(m){map.removeLayer(m);});
  markers={};
  filtered.forEach(function(r){
    var mk=L.marker([r.lat,r.lng],{
      icon:mkIcon(r.menu,r.id===activeId),
      zIndexOffset:r.id===activeId?100:0
    }).addTo(map);
    mk.bindPopup(buildPopHTML(r),{
      maxWidth:400,minWidth:280,
      autoPan:false,
      closeButton:true
    });
    mk.on('click',function(){
      var clickedId=r.id;
      activeId=clickedId;
      document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('on');});
      var li=$id('li-'+clickedId);
      if(li){
        li.classList.add('on');
        // 사이드바 내부 스크롤만
        var rl=$id('rl');
        if(rl){rl.scrollTop=li.offsetTop-rl.offsetTop-60;}
      }
      renderMarkers();
      setTimeout(function(){
        if(markers[clickedId])markers[clickedId].openPopup();
      },50);
    });
    // popupopen: 수정버튼 연결 + 팝업 터치를 지도로 전달
    (function(rid){
      mk.on('popupopen',function(){
        var popup=mk.getPopup();
        if(!popup)return;
        var el=popup.getElement();
        if(!el)return;

        // 수정 버튼 연결
        var btn=el.querySelector('.eb');
        if(btn){
          btn.onclick=null;
          btn.addEventListener('click',function(e){
            e.stopPropagation();
            openEdit(rid);
          });
        }

        // 좌우 드래그만 지도로 전달, 상하는 팝업 스크롤
        var wrapper=el.querySelector('.leaflet-popup-content-wrapper');
        if(!wrapper)return;

        var startX,startY,startMapX,startMapY,direction=null;
        var mapCont=map.getContainer();

        wrapper.addEventListener('touchstart',function(e){
          if(e.target.closest('button,a'))return;
          var t=e.touches[0];
          startX=t.clientX; startY=t.clientY; direction=null;
          // 지도 드래그 시작 준비
          var rect=mapCont.getBoundingClientRect();
          startMapX=t.clientX-rect.left;
          startMapY=t.clientY-rect.top;
        },{passive:true});

        wrapper.addEventListener('touchmove',function(e){
          if(e.target.closest('button,a'))return;
          var t=e.touches[0];
          var dx=t.clientX-startX;
          var dy=t.clientY-startY;
          // 방향 첫 판별
          if(!direction){
            if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.5){
              direction='h'; // 좌우
            } else if(Math.abs(dy)>8){
              direction='v'; // 상하 → 팝업 스크롤
              return;
            } else {
              return;
            }
          }
          if(direction==='v')return;
          // 좌우: 지도 pan
          map.panBy([-dx*0.8, 0],{animate:false,duration:0});
          startX=t.clientX; startY=t.clientY;
        },{passive:true});

        wrapper.addEventListener('touchend',function(e){
          direction=null;
        },{passive:true});
      });
    })(r.id);
    markers[r.id]=mk;
  });
  $id('badge').textContent=filtered.length+'\uac1c';
}

function selFromList(id){
  activeId=id;
  document.querySelectorAll('.ri').forEach(function(el){el.classList.remove('on');});
  var li=$id('li-'+id);
  if(li){
    li.classList.add('on');
    // 사이드바 내부 스크롤만 (페이지 스크롤 방지)
    var rl=$id('rl');
    if(rl){rl.scrollTop=li.offsetTop-rl.offsetTop-60;}
  }
  var r=DATA.find(function(x){return x.id===id;});
  if(!r)return;
  renderMarkers();
  // 해당 식당 위치로 지도 이동 후 팝업 열기
  if(r.lat&&r.lng){
    map.setView([r.lat,r.lng],16,{animate:true,duration:0.5});
  }
  setTimeout(function(){if(markers[id])markers[id].openPopup();},550);
}

function menuCls(m){
  var map={'한식':'tgm-h','중식':'tgm-c','일식':'tgm-j','양식':'tgm-y','고기':'tgm-g','기타':'tgm-e'};
  return map[m]||'';
}
function buildChips(){
  $id('rc').innerHTML=REGIONS.map(function(v){
    return'<span class="chip'+(selR.has(v)?' ar':'')+'" data-v="'+v+'">'+v+'</span>';
  }).join('');
  $id('mc').innerHTML=MENUS.map(function(v){
    return'<span class="chip'+(selM.has(v)?' am':'')+'" data-v="'+v+'">'+v+'</span>';
  }).join('');
}
function applySearch(){
  var inp=$id('searchInput');
  var q=inp?inp.value.trim().toLowerCase():'';
  map.closePopup();activeId=null;
  filtered=DATA.filter(function(r){
    var regionOk=(selR.size===0||selR.has(r.region));
    var menuOk=(selM.size===0||selM.has(r.menu));
    var searchOk=!q||(r.name&&r.name.toLowerCase().indexOf(q)>=0);
    return regionOk&&menuOk&&searchOk;
  });
  renderList();renderMarkers();
}
function applyF(){
  map.closePopup();activeId=null;
  // 현재 DATA에 존재하는 지역 목록 추출
  var dataRegions=[];
  DATA.forEach(function(r){
    if(r.region&&r.region!=='기타'&&dataRegions.indexOf(r.region)<0){
      dataRegions.push(r.region);
    }
  });
  // 새 지역 추가 + 없어진 지역 제거
  var changed=false;
  dataRegions.forEach(function(rg){
    if(REGIONS.indexOf(rg)<0){REGIONS.push(rg);changed=true;}
  });
  for(var i=REGIONS.length-1;i>=0;i--){
    if(dataRegions.indexOf(REGIONS[i])<0){
      selR.delete(REGIONS[i]);
      REGIONS.splice(i,1);
      changed=true;
    }
  }
  if(changed)buildChips();
  applySearch();
}
function renderList(){
  $id('cnt').textContent=filtered.length+'\uac1c';
  var nr=$id('nores');
  if(!filtered.length){nr.style.display='block';$id('rl').innerHTML='';return;}
  nr.style.display='none';
  // 가나다 순 정렬
  var sorted=filtered.slice().sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
  $id('rl').innerHTML=sorted.map(function(r){
    return'<div class="ri'+(r.id===activeId?' on':'')+'" id="li-'+r.id+'" data-id="'+r.id+'">'
      +'<div class="rn">'+r.name+'</div>'
      +'<div class="rt"><span class="tg tgr">'+r.region+'</span><span class="tg tgm '+menuCls(r.menu)+'">'+r.menu+'</span>'
      +'<span style="font-size:10px;color:#9ca3af;margin-left:2px">'+r.detail+'</span></div></div>';
  }).join('');
  $id('rl').onclick=function(e){var el=e.target.closest('.ri');if(el)selFromList(el.dataset.id);};
}
function togSB(){
  sbOn=!sbOn;
  $id('sb').classList.toggle('hide',!sbOn);
  $id('tog').innerHTML=sbOn?'&#9664;':'&#9654;';
  setTimeout(function(){map.invalidateSize();},280);

var pinMap=null,pinMarker=null,pendingLat=null,pendingLng=null;
function initPinMap(lat,lng){
  var wrap=$id('pinMapWrap');
  if(!wrap)return;
  wrap.style.display='block';
  if(!pinMap){
    pinMap=L.map('pinMap',{zoomControl:true,tap:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(pinMap);
    pinMap.on('click',function(e){
      var ll=e.latlng;
      pendingLat=ll.lat;pendingLng=ll.lng;
      if(pinMarker)pinMarker.setLatLng(ll);
      else pinMarker=L.marker(ll,{draggable:true}).addTo(pinMap);
      pinMarker.off('dragend').on('dragend',function(ev){
        pendingLat=ev.target.getLatLng().lat;
        pendingLng=ev.target.getLatLng().lng;
        updatePinTxt();
      });
      updatePinTxt();
    });
  }
  var clat=lat||37.555,clng=lng||126.977;
  pinMap.setView([clat,clng],16);
  setTimeout(function(){pinMap.invalidateSize();},50);
  if(lat&&lng){
    pendingLat=lat;pendingLng=lng;
    if(pinMarker)pinMarker.setLatLng([lat,lng]);
    else pinMarker=L.marker([lat,lng],{draggable:true}).addTo(pinMap);
    pinMarker.off('dragend').on('dragend',function(ev){
      pendingLat=ev.target.getLatLng().lat;
      pendingLng=ev.target.getLatLng().lng;
      updatePinTxt();
    });
    updatePinTxt();
  }
}
function updatePinTxt(){
  var el=$id('pinCoordTxt');
  if(el&&pendingLat)el.textContent='('+pendingLat.toFixed(5)+', '+pendingLng.toFixed(5)+')';
}
function openModal(){
  $id('moOverlay').classList.add('open');
  // 지도 열려있으면 크기 재계산
  if(pinMap)setTimeout(function(){pinMap.invalidateSize();},100);
}
function closeModal(){
  $id('moOverlay').classList.remove('open');
  // 핀 지도 숨기기
  var wrap=$id('pinMapWrap');
  if(wrap)wrap.style.display='none';
  pendingLat=null;pendingLng=null;
  var txt=$id('pinCoordTxt');if(txt)txt.textContent='';
}
function openEdit(id){

  $id('mtit').textContent='\uc2dd\ub2f9 \uc218\uc815';
  $id('delbtn').style.display='inline-flex';
  $id('eid').value=id;$id('en').value=r.name||'';$id('er').value=r.region||'중구';
  pendingLat=r.lat||null;pendingLng=r.lng||null;
  $id('em').value=r.menu||'\ud55c\uc2dd';$id('ed').value=r.detail||'';$id('ea').value=r.addr||'';
  $id('et').value=r.tel||'';$id('es').value=r.station||'';$id('eroom').value=r.room||'O';
  $id('ecork').value=r.cork||'O';$id('enav').value=r.naver||'';$id('emo').value=r.memo||'';$id('erv').value=r.review||'';
  openModal();
  setTimeout(function(){initPinMap(r.lat,r.lng);},80);
}
function openAdd(){
  editId=null;isAdd=true;
  $id('mtit').textContent='\uc0c8 \uc2dd\ub2f9 \ucd94\uac00';
  $id('delbtn').style.display='none';
  ['en','ed','ea','et','es','enav','emo','erv'].forEach(function(f){$id(f).value='';});
  $id('er').value='중구';$id('em').value='한식';$id('eroom').value='O';$id('ecork').value='O';
  openModal();
  setTimeout(function(){initPinMap(37.555,126.977);},80);
}
function saveR(){
  var name=$id('en').value.trim();
  if(!name){showT('\u26a0\ufe0f \uc0c1\ud638\uba85\uc744 \uc785\ub825\ud574\uc8fc\uc138\uc694');return;}
  var region=$id('er').value,c=RC[region]||[37.555,126.977];
  var ex=DATA.find(function(x){return x.id===editId;});
  // 위치: 핀 지도에서 지정했으면 우선 사용, 아니면 기존 좌표 or 지역 중심
  var useLat=pendingLat||(ex?ex.lat:null)||(isAdd?c[0]+(Math.random()-.5)*.005:c[0]);
  var useLng=pendingLng||(ex?ex.lng:null)||(isAdd?c[1]+(Math.random()-.5)*.005:c[1]);
  var d={id:isAdd?'r'+Date.now():editId,name:name,region:region,
    menu:$id('em').value,detail:$id('ed').value.trim(),addr:$id('ea').value.trim(),
    tel:$id('et').value.trim(),station:$id('es').value.trim(),room:$id('eroom').value,
    cork:$id('ecork').value,naver:$id('enav').value.trim(),
    memo:$id('emo').value.trim(),review:$id('erv').value.trim(),
    lat:useLat,lng:useLng};
  if(isAdd){DATA.push(d);}else{var i=DATA.findIndex(function(x){return x.id===editId;});if(i>=0)DATA[i]=d;}
  if(dbRef){try{dbRef.child('restaurants').child(d.id).set(d);}catch(e){}}
  applyF();closeModal();map.closePopup();
  showT(isAdd?'\u2705 \ucd94\uac00\ub418\uc5c8\uc2b5\ub2c8\ub2e4':'\u2705 \uc218\uc815\ub418\uc5c8\uc2b5\ub2c8\ub2e4');
  if(!isAdd)selFromList(d.id);
}
function delR(){
  if(!confirm('\uc0ad\uc81c\ud558\uc2dc\uaca0\uc5b4\uc694?'))return;
  DATA=DATA.filter(function(x){return x.id!==editId;});
  if(dbRef){try{dbRef.child('restaurants').child(editId).remove();}catch(e){}}
  applyF();closeModal();map.closePopup();
  showT('\ud83d\uddd1 \uc0ad\uc81c\ub418\uc5c8\uc2b5\ub2c8\ub2e4');
}
function loadXL(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){showT('\u26a0\ufe0f \ub370\uc774\ud130 \uc5c6\uc74c');return;}
      var keys=Object.keys(rows[0]);
      var fc=function(){for(var i=0;i<arguments.length;i++){if(keys.indexOf(arguments[i])>=0)return arguments[i];}return null;};
      var nC=fc('\uc0c1 \ud638','\uc0c1\ud638','\uc0c1\ud638\uba85');
      if(!nC){showT('\u26a0\ufe0f \uc0c1\ud638\uba85 \ucee8\ub7fc \uc5c6\uc74c');return;}
      var kakaoKey=localStorage.getItem('kakao_geo_key')||'';
      var g2=function(row){var k=fc.apply(null,Array.prototype.slice.call(arguments,1));var v=k?row[k]:'';return v?String(v).replace(/\n{3,}/g,'\n').replace(/^nan$/,'').trim():'';};
      var rawRows=rows.filter(function(r){return r[nC];}).map(function(row,i){
        var nm=String(row[nC]||'').trim(),rg=String(row[fc('지역')||'']||'').trim();
        var mr=String(row[fc('메뉴')||'']||'').trim(),mn='기타';
        if(mr.indexOf('한식')>=0)mn='한식';
        else if(mr.indexOf('중식')>=0)mn='중식';
        else if(mr.indexOf('일식')>=0)mn='일식';
        else if(mr.indexOf('양식')>=0)mn='양식';
        else if(mr.indexOf('고기')>=0)mn='고기';
        var dm=mr.match(/[\(\uff08](.+?)[\)\uff09]/);var dt=dm?dm[1]:mr.trim();
        // 주소 컬럼 최대한 넓게 탐색
        var latCol=fc('위도','lat','latitude','LAT','Lat');
        var lngCol=fc('경도','lng','longitude','LNG','Lng');
        var addrCol=fc('위치','주소','addr','address','도로명주소','지번주소','소재지');
        var addr=addrCol?String(row[addrCol]||'').replace(/^nan$/,'').trim():'';
        var ct=RC[rg]||[37.555,126.977];
        return{id:'rx'+i+'_'+Date.now(),name:nm,region:rg,menu:mn,detail:dt,
          addr:addr,
          tel:String(row[fc('전화번호','전화')||'']||'').replace(/\n/g,' ').replace(/^nan$/,'').trim(),
          station:String(row[fc('인근역','역')||'']||'').replace(/\n/g,'/').replace(/^nan$/,'').trim(),
          room:g2(row,'룸 여부','룸여부'),cork:g2(row,'콜키지'),
          naver:g2(row,'네이버 링크','네이버링크'),
          memo:g2(row,'메모'),review:g2(row,'코멘트(리뷰)','코멘트'),
          _addr:addr,_nm:nm,_rg:rg,_ct:ct,
          lat:(latCol&&row[latCol])?parseFloat(row[latCol]):null,
          lng:(lngCol&&row[lngCol])?parseFloat(row[lngCol]):null};
      });

      // 주소에서 순수 도로명 부분만 추출 (건물명/층수 등 제거)
      function cleanAddr(addr){
        if(!addr)return '';
        // 줄바꿈 제거
        var a=addr.replace(/\n/g,' ').trim();
        // "서울 중구 을지로 30 롯데호텔서울 37층" → "서울 중구 을지로 30" 추출
        // 숫자(번지/길번호) 이후 한글 건물명/층수 패턴 제거
        // 패턴: 시/구/로/길 + 숫자 뒤에 오는 불필요 텍스트
        var m=a.match(/^((?:서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)?\s*\S+[시도]\s*)?(.*?(?:[로길]\s*\d+(?:-\d+)?|\d+(?:-\d+)?\s*번지))/);
        if(m&&m[0]&&m[0].length>5){
          return m[0].trim();
        }
        // 패턴 매칭 실패 시: 공백 기준으로 앞 4~5 토큰만 사용
        var parts=a.split(/\s+/);
        // "서울 서초구 반포대로30길 66 상은빌딩 1층" → 앞 4개 토큰
        if(parts.length>4){
          // 숫자로만 이루어진 토큰 위치 찾기 (번지수)
          var lastNumIdx=3;
          for(var i=0;i<Math.min(parts.length,6);i++){
            if(/^\d/.test(parts[i]))lastNumIdx=i;
          }
          return parts.slice(0,lastNumIdx+1).join(' ');
        }
        return a;
      }

      // 카카오 Geocoding: 주소정제 → 주소검색 → 키워드검색 3단 fallback
      function kakaoGeoOne(r,key,cb){
        // 엑셀에 위도/경도 직접 입력된 경우 → API 건너뜀
        if(r.lat&&r.lng){cb();return;}
        if(!r._addr&&!r._nm){cb();return;}

        var rawAddr=r._addr||'';
        var cleanedAddr=cleanAddr(rawAddr);

        // 1차: 정제된 주소로 검색
        function tryAddr(q,next){
          if(!q){next();return;}
          fetch('https://dapi.kakao.com/v2/local/search/address.json?query='+encodeURIComponent(q),{
            headers:{'Authorization':'KakaoAK '+key}
          }).then(function(res){return res.json();})
          .then(function(data){
            if(data.documents&&data.documents.length){
              r.lat=parseFloat(data.documents[0].y);
              r.lng=parseFloat(data.documents[0].x);
              cb();
            } else {next();}
          }).catch(function(){next();});
        }

        // 2차: 원본 주소로 검색
        function tryRawAddr(){
          if(rawAddr&&rawAddr!==cleanedAddr){
            tryAddr(rawAddr,tryKeyword);
          } else {tryKeyword();}
        }

        // 3차: 식당명으로 키워드 검색
        function tryKeyword(){
          var kw=r._nm+(r._rg?' '+r._rg:'');
          fetch('https://dapi.kakao.com/v2/local/search/keyword.json?query='+encodeURIComponent(kw)+'&category_group_code=FD6',{
            headers:{'Authorization':'KakaoAK '+key}
          }).then(function(res){return res.json();})
          .then(function(data){
            if(data.documents&&data.documents.length){
              r.lat=parseFloat(data.documents[0].y);
              r.lng=parseFloat(data.documents[0].x);
            }
            cb();
          }).catch(function(){cb();});
        }

        tryAddr(cleanedAddr,tryRawAddr);
      }

      function finalizeData(rows){
        rows.forEach(function(r){
          if(!r.lat||!r.lng){
            var ct=r._ct||[37.555,126.977];
            r.lat=ct[0]+(Math.random()-.5)*.008;
            r.lng=ct[1]+(Math.random()-.5)*.008;
          }
          delete r._addr;delete r._nm;delete r._rg;delete r._ct;
        });
        DATA=rows;
        if(dbRef){var obj={};DATA.forEach(function(r){obj[r.id]=r;});dbRef.child('restaurants').set(obj);}
        selR.clear();selM.clear();document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('ar','am');});
        applyF();showT('✅ '+DATA.length+'개 업데이트 완료');
      }

      if(kakaoKey){
        showT('📍 위치 변환 중... ('+rawRows.length+'개)');
        var done=0,total=rawRows.length;
        // 동시 요청 폭탄 방지: 5개씩 순차 처리
        function processNext(idx){
          if(idx>=total){finalizeData(rawRows);return;}
          var batch=rawRows.slice(idx,idx+20);
          var bdone=0;
          batch.forEach(function(r){
            kakaoGeoOne(r,kakaoKey,function(){
              bdone++;
              if(bdone===batch.length){
                done+=batch.length;
                showT('📍 위치 변환 중... ('+done+'/'+total+')');
                setTimeout(function(){processNext(idx+20);},30); // 요청 간격
              }
            });
          });
        }
        processNext(0);
      } else {
        finalizeData(rawRows);
        setTimeout(function(){showT('💡 📍위치키 버튼에 카카오 API 키 등록 시 정확한 위치 자동 설정');},2000);
      }
    }catch(err){showT('\u26a0\ufe0f '+err.message);}
  };
  reader.readAsArrayBuffer(file);event.target.value='';
}
function openShare(){
  $id('fbi').value=localStorage.getItem('fb_url')||'';
  var saved=localStorage.getItem('fb_url');
  if(saved)updateViewLink(saved);
  $id('soOverlay').classList.add('open');
}
function connectFB(){
  var url=$id('fbi').value.trim();
  if(url.indexOf('https://')!==0){showT('\u26a0\ufe0f Firebase URL \ud655\uc778');return;}
  localStorage.setItem('fb_url',url);$id('soOverlay').classList.remove('open');initFB(url);
  // 보기전용 링크 생성
  updateViewLink(url);
}
function updateViewLink(url){
  if(!url)return;
  var base=window.location.href.replace(/\/[^\/]*$/, '/') + 'viewer.html';
  var link=base+'?fb='+encodeURIComponent(url);
  var wrap=$id('viewLinkWrap');
  var inp=$id('viewLinkInput');
  if(wrap&&inp){wrap.style.display='block';inp.value=link;}
}
function initFB(url){
  if(typeof firebase==='undefined'){setTimeout(function(){initFB(url);},500);return;}
  try{
    var app=firebase.initializeApp({databaseURL:url},'app_'+Date.now());
    var db=firebase.database(app);dbRef=db.ref('/foodiMap');
    dbRef.child('restaurants').on('value',function(snap){
      var v=snap.val();if(v){DATA=Object.values(v);saveEditCache(DATA);applyF();}
    },function(){});
  }catch(e){showT('\u26a0\ufe0f '+e.message);}
}
document.addEventListener('DOMContentLoaded',function(){
  $id('xlBtn').addEventListener('click',function(){$id('xli').click();});
  $id('xli').addEventListener('change',loadXL);
  $id('shareBtn').addEventListener('click',openShare);
  $id('addBtn').addEventListener('click',openAdd);
  $id('tog').addEventListener('click',togSB);
  $id('moX').addEventListener('click',closeModal);
  $id('moCancel').addEventListener('click',closeModal);
  $id('moSave').addEventListener('click',saveR);
  $id('delbtn').addEventListener('click',delR);
  $id('moOverlay').addEventListener('click',function(e){if(e.target===$id('moOverlay'))closeModal();});
  $id('fbOk').addEventListener('click',connectFB);
  $id('fbSkip').addEventListener('click',function(){$id('soOverlay').classList.remove('open');});
  $id('soOverlay').addEventListener('click',function(e){if(e.target===$id('soOverlay'))$id('soOverlay').classList.remove('open');});
  var copyBtn=$id('copyViewLink');
  if(copyBtn){copyBtn.addEventListener('click',function(){
    var inp=$id('viewLinkInput');
    if(!inp||!inp.value)return;
    navigator.clipboard.writeText(inp.value).then(function(){showT('✅ 링크 복사됨!');}).catch(function(){inp.select();document.execCommand('copy');showT('✅ 링크 복사됨!');});
  });}
  // 카카오 API 키 모달
  $id('geoKeyBtn').addEventListener('click',function(){
    var k=localStorage.getItem('kakao_geo_key')||'';
    $id('geoKeyInput').value=k;
    $id('geoOverlay').style.display='flex';
  });
  $id('geoKeySave').addEventListener('click',function(){
    var k=$id('geoKeyInput').value.trim();
    if(!k){showT('⚠️ API 키를 입력해주세요');return;}
    localStorage.setItem('kakao_geo_key',k);
    $id('geoOverlay').style.display='none';
    showT('✅ 카카오 API 키 저장 완료');
  });
  $id('geoKeyDel').addEventListener('click',function(){
    localStorage.removeItem('kakao_geo_key');
    $id('geoKeyInput').value='';
    showT('🗑 API 키 삭제됨');
  });
  $id('geoKeyCancel').addEventListener('click',function(){$id('geoOverlay').style.display='none';});
  $id('geoOverlay').addEventListener('click',function(e){if(e.target===$id('geoOverlay'))$id('geoOverlay').style.display='none';});
  buildChips();
  filtered=DATA.slice();
  initMap();
  renderList();

  // 지역 필터 (한 번만 등록)
  document.getElementById('rc').addEventListener('click',function(e){
    var el=e.target;
    if(!el.classList.contains('chip'))return;
    var v=el.dataset.v;
    if(selR.has(v)){selR.delete(v);el.classList.remove('ar');}
    else{selR.add(v);el.classList.add('ar');}
    applySearch();
  });
  // 메뉴 필터 (한 번만 등록)
  document.getElementById('mc').addEventListener('click',function(e){
    var el=e.target;
    if(!el.classList.contains('chip'))return;
    var v=el.dataset.v;
    if(selM.has(v)){selM.delete(v);el.classList.remove('am');}
    else{selM.add(v);el.classList.add('am');}
    applySearch();
  });
  // 검색창
  var sinp=document.getElementById('searchInput');
  var sclr=document.getElementById('searchClear');
  if(sinp){
    sinp.addEventListener('input',function(){applySearch();});
  }
  if(sclr){
    sclr.addEventListener('click',function(){
      sinp.value='';
      sinp.focus();
      applySearch();
    });
  }

  window.addEventListener('resize',function(){if(map)map.invalidateSize();});
  // 위치 핀 지도 토글
  var pinTogBtn=$id('pinTogBtn');
  if(pinTogBtn){
    pinTogBtn.addEventListener('click',function(){
      var wrap=$id('pinMapWrap');
      if(!wrap)return;
      var showing=wrap.style.display==='block';
      if(showing){
        wrap.style.display='none';
        pinTogBtn.textContent='지도에서 클릭';
      } else {
        wrap.style.display='block';
        pinTogBtn.textContent='닫기';
        var ex=DATA.find(function(x){return x.id===$id('eid').value;});
        setTimeout(function(){initPinMap(ex?ex.lat:pendingLat,ex?ex.lng:pendingLng);},50);
      }
    });
  }
  var s=localStorage.getItem('fb_url');if(s)initFB(s);
});
})();
